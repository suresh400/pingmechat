<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C3AED" />
    <meta
      name="description"
      content="PingsMe — Real-time messaging, group chats, voice &amp; video calls, all in one beautifully designed platform."
    />
    <!-- Canonical URL: tells Google the authoritative page is always "/" -->
    <link rel="canonical" href="https://pingsme.in/" />
    <!-- Open Graph / Social -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://pingsme.in/" />
    <meta property="og:title"       content="PingsMe — Real-time Messaging &amp; Video Calls" />
    <meta property="og:description" content="Real-time messaging, group chats, voice &amp; video calls, all in one beautifully designed platform." />
    <meta property="og:image"       content="https://pingsme.in/logo512.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://pingsme.in/" />
    <meta name="twitter:title"       content="PingsMe — Real-time Messaging &amp; Video Calls" />
    <meta name="twitter:description" content="Real-time messaging, group chats, voice &amp; video calls, all in one beautifully designed platform." />
    <meta name="twitter:image"       content="https://pingsme.in/logo512.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>PingsMe — Real-time Messaging & Video Calls</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
