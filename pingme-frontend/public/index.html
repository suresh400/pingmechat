<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C3AED" />
    <meta
      name="description"
      content="PingsMe — Real-time messaging, group chats, voice &amp; video calls, all in one beautifully designed platform."
    />
    <!-- Canonical URL: tells Google the authoritative page is always "/" -->
    <link rel="canonical" href="https://pingsme.in/" />
    <!-- Open Graph / Social -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://pingsme.in/" />
    <meta property="og:title"       content="PingsMe — Real-time Messaging &amp; Video Calls" />
    <meta property="og:description" content="Real-time messaging, group chats, voice &amp; video calls, all in one beautifully designed platform." />
    <meta property="og:image"       content="https://pingsme.in/logo512.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://pingsme.in/" />
    <meta name="twitter:title"       content="PingsMe — Real-time Messaging &amp; Video Calls" />
    <meta name="twitter:description" content="Real-time messaging, group chats, voice &amp; video calls, all in one beautifully designed platform." />
    <meta name="twitter:image"       content="https://pingsme.in/logo512.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!--
      PERFORMANCE: Load Google Fonts non-blocking.
      Step 1: preconnect so DNS + TLS are done early
      Step 2: load CSS as print stylesheet (non-blocking), swap to all on load
      Step 3: <noscript> fallback for users with JS disabled
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <title>PingsMe — Real-time Messaging &amp; Video Calls</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
